# Rate Limiter Configuration
rate.limiter.capacity=10
rate.limiter.refill.rate.per.second=2.0
rate.limiter.tokens.required=1

# Storage Configuration
# redis  -> distributed, shared across instances (default, requires Redis)
# memory -> in-process only, no external dependency (good for local dev / demos)
storage.type=redis

# Redis Configuration
redis.host=localhost
redis.port=6379

# Server Configuration
server.port=8080

